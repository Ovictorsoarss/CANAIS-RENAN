<style>
  /* ═══════ NEO-BRUTALISMO ═══════ */
  :root {
    --yellow: #fefefd;
    --charcoal: #171e19;
    --sage: #b7c6c2;
    --green: #00C853;
    --black: #000000;
    --white: #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--charcoal);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Satoshi', sans-serif;
    font-weight: 500;
    overflow-x: hidden;
  }

  .page-wrapper {
    width: 100%;
    max-width: 430px;
    background: var(--yellow);
    position: relative;
    overflow: hidden;
    border-left: 2px solid var(--black);
    border-right: 2px solid var(--black);
  }

  /* ─── SECTION 1: BANNER ─── */
  .banner {
    background: var(--yellow);
    position: relative;
    overflow: hidden;
    padding: 0;
    border-bottom: 2px solid var(--black);
  }

  .banner-img-wrap {
    position: relative;
    z-index: 4;
    line-height: 0;
    overflow: hidden;
    animation: motoIn 0.9s cubic-bezier(.22,1,.36,1) 0.2s both;
  }

  .banner-img-wrap img {
    width: 100%;
    display: block;
  }

  @keyframes motoIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Notas de dinheiro flutuantes */
  .money-note {
    position: absolute;
    font-size: 28px;
    z-index: 3;
    pointer-events: none;
    animation: floatNote var(--dur, 3s) ease-in-out var(--delay, 0s) infinite alternate;
    opacity: 0.9;
  }

  @keyframes floatNote {
    from { transform: translateY(0) rotate(var(--rot-from, -8deg)); }
    to   { transform: translateY(-12px) rotate(var(--rot-to, 8deg)); }
  }

  /* ─── SECTION 2: CTA ─── */
  .cta-section {
    background: var(--yellow);
    background-image: radial-gradient(rgba(0,0,0,0.10) 2px, transparent 2px);
    background-size: 32px 32px;
    padding: 40px 24px 48px;
    text-align: center;
    position: relative;
  }

  .cta-card {
    background: transparent;
    padding: 32px 20px 28px;
  }

  .cta-text {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.1;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  .cta-text-green {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 62px;
    font-weight: 800;
    color: var(--black);
    line-height: 0.95;
    letter-spacing: -2px;
    text-transform: uppercase;
    animation: fadeUp 0.7s ease 0.35s both;
  }

  .cta-text-green2 {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--black);
    margin-bottom: 26px;
    text-transform: uppercase;
    letter-spacing: -0.5px;
    line-height: 1.3;
    animation: fadeUp 0.7s ease 0.5s both;
  }

  .highlight-iphone {
    display: inline-block;
    color: var(--white);
    background: var(--charcoal);
    padding: 2px 10px;
    border: 2px solid var(--black);
    border-radius: 8px;
    transform: rotate(-2deg);
    box-shadow: 3px 3px 0px 0px var(--black);
    animation: iphonePulse 1.8s ease-in-out infinite;
  }

  @keyframes iphonePulse {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(-2deg) scale(1.05); }
  }

  /* Neo-Brutalist Push Button */
  .cta-btn {
    display: block;
    width: 100%;
    margin: 0 auto;
    background: var(--green);
    color: var(--white);
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 18px 16px;
    border: 2px solid var(--black);
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 8px 8px 0px 0px var(--black);
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.7s ease 0.65s both;
  }

  .cta-btn:hover,
  .cta-btn:active {
    transform: translate(4px, 4px);
    box-shadow: 4px 4px 0px 0px var(--black);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Decoração abaixo do botão */
  .cta-footer {
    display: inline-block;
    margin-top: 22px;
    font-family: 'Satoshi', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--black);
    letter-spacing: 1px;
    background: var(--sage);
    border: 2px solid var(--black);
    border-radius: 999px;
    padding: 6px 16px;
    box-shadow: 4px 4px 0px 0px var(--black);
    animation: fadeUp 0.7s ease 0.85s both;
  }

  /* Estrelas */
  .stars {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 16px;
    animation: fadeUp 0.7s ease 0.95s both;
  }

  .stars span {
    font-size: 18px;
    color: #ffbc2e;
  }

  /* Responsive mínimo */
  @media (max-width: 360px) {
    .cta-text-green { font-size: 52px; }
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <!-- ═══════════════════════════════════ -->
  <!--        SEÇÃO 1: BANNER VERMELHO     -->
  <!-- ═══════════════════════════════════ -->
  <section class="banner">

    <!-- Notas de dinheiro flutuantes ao redor -->
    <div class="money-note" style="top:6%;left:3%;--dur:2.8s;--delay:0s;--rot-from:-15deg;--rot-to:5deg;">💵</div>
    <div class="money-note" style="top:14%;right:4%;--dur:2.6s;--delay:0.7s;--rot-from:-8deg;--rot-to:12deg;">💵</div>
    <div class="money-note" style="top:50%;left:2%;--dur:3.5s;--delay:0.2s;--rot-from:12deg;--rot-to:-10deg;font-size:22px;">💰</div>
    <div class="money-note" style="top:58%;right:3%;--dur:3s;--delay:0.9s;--rot-from:-10deg;--rot-to:8deg;font-size:20px;">💵</div>
    <div class="money-note" style="top:80%;left:4%;--dur:4s;--delay:1.1s;--rot-from:5deg;--rot-to:-12deg;font-size:18px;">💴</div>
    <div class="money-note" style="top:86%;right:5%;--dur:3.3s;--delay:0.5s;--rot-from:-6deg;--rot-to:10deg;font-size:20px;">💵</div>

    <!-- Banner completo (imagem) -->
    <div class="banner-img-wrap">
      <img src="https://i.imgur.com/5wIgz57.png" alt="Concorra a 160 dos Sonhos - Honda CG" loading="eager">
    </div>

  </section>

  <!-- ═══════════════════════════════════ -->
  <!--        SEÇÃO 2: CTA BRANCO          -->
  <!-- ═══════════════════════════════════ -->
  <section class="cta-section">

    <div class="cta-card">
      <p class="cta-text">Entre no grupo e</p>
      <p class="cta-text-green">CONCORRA</p>
      <p class="cta-text-green2">A 1 <span class="highlight-iphone">IPHONE 13</span> TOTALMENTE GRATUITO 👇</p>

      <a href="https://chat.whatsapp.com/HXRc0BVfvfOEemBRPw6jCL" class="cta-btn">🏆 ENTRAR NO GRUPO VIP</a>

      <div class="stars">
        <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
      </div>

      <p class="cta-footer">PROMOÇÃO VÁLIDA POR TEMPO LIMITADO</p>
    </div>

  </section>

</div>

<script>
  // Todos os botões/CTAs do site
  const buttons = document.querySelectorAll('.cta-btn, button, a.cta-btn, [data-cta]');

  // Pulse extra ao entrar na viewport
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.style.animationPlayState = 'running';
      }
    });
  }, { threshold: 0.5 });

  buttons.forEach((btn) => {
    observer.observe(btn);

    btn.addEventListener('click', function(e) {
      e.preventDefault();

      // Dispara evento de Lead no Meta Pixel
      if (typeof fbq === 'function') {
        fbq('track', 'Lead');
      }

      // Efeito ripple
      const ripple = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `
        position:absolute;
        width:${size}px;height:${size}px;
        border-radius:50%;
        background:rgba(255,255,255,0.3);
        top:${e.clientY - rect.top - size/2}px;
        left:${e.clientX - rect.left - size/2}px;
        transform:scale(0);
        animation:rippleAnim 0.5s ease-out forwards;
        pointer-events:none;
      `;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);

      // Redireciona após registrar o Lead (se houver destino real)
      const href = btn.getAttribute('href');
      if (href && href !== '#') {
        setTimeout(() => { window.location.href = href; }, 300);
      }
    });
  });

  const style = document.createElement('style');
  style.textContent = `
    @keyframes rippleAnim {
      to { transform: scale(2.5); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
</script>

</body>
</html>
