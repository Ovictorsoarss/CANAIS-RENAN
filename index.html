<style>
  /* ═══════ NEO-BRUTALISMO ═══════ */
  :root {
    --yellow: #fefefd;
    --charcoal: #171e19;
    --sage: #b7c6c2;
    --green: #00C853;
    --black: #000000;
    --white: #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--charcoal);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Satoshi', sans-serif;
    font-weight: 500;
    overflow-x: hidden;
  }

  .page-wrapper {
    width: 100%;
    max-width: 430px;
    background: var(--yellow);
    position: relative;
    overflow: hidden;
    border: none;
  }

  /* ─── SECTION 1: BANNER ─── */
  .banner {
    background: var(--yellow);
    background-image: radial-gradient(rgba(0,0,0,0.10) 2px, transparent 2px);
    background-size: 32px 32px;
    position: relative;
    overflow: hidden;
    padding: 0;
  }

  .banner-img-wrap {
    position: relative;
    z-index: 4;
    line-height: 0;
    overflow: hidden;
    animation: motoIn 0.9s cubic-bezier(.22,1,.36,1) 0.2s both;
    width: 100%;
  }

  .video-wrap {
    position: relative;
    width: 72%;
    max-width: 280px;
    margin: 32px auto;
    padding-bottom: calc(72% * 1.7778);
    max-height: none;
    background: #000;
    border-radius: 24px;
    overflow: hidden;
    border: none;
    box-shadow: none;
  }

  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  @keyframes motoIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Notas de dinheiro flutuantes */
  .money-note {
    position: absolute;
    font-size: 28px;
    z-index: 3;
    pointer-events: none;
    animation: floatNote var(--dur, 3s) ease-in-out var(--delay, 0s) infinite alternate;
    opacity: 0.9;
  }

  @keyframes floatNote {
    from { transform: translateY(0) rotate(var(--rot-from, -8deg)); }
    to   { transform: translateY(-12px) rotate(var(--rot-to, 8deg)); }
  }

  /* ─── SECTION 2: CTA ─── */
  .cta-section {
    background: var(--yellow);
    background-image: radial-gradient(rgba(0,0,0,0.10) 2px, transparent 2px);
    background-size: 32px 32px;
    padding: 16px 24px 40px;
    text-align: center;
    position: relative;
  }

  .cta-card {
    background: transparent;
    padding: 8px 20px 20px;
  }

  .cta-text {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.1;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  .cta-text-green {
    display: inline-block;
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 44px;
    font-weight: 800;
    color: var(--white);
    -webkit-text-stroke: 2px var(--black);
    paint-order: stroke fill;
    line-height: 0.95;
    letter-spacing: -2px;
    text-transform: uppercase;
    position: relative;
    padding: 3px 14px;
    margin: 6px 0;
    z-index: 0;
    animation: fadeUp 0.7s ease 0.35s both;
  }

  .cta-text-green::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #E01F1F;
    transform: skewX(-12deg);
    box-shadow: 6px 6px 0px 0px var(--black);
    z-index: -1;
  }

  .cta-text-green2 {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--black);
    margin-top: 14px;
    margin-bottom: 26px;
    text-transform: uppercase;
    letter-spacing: -0.5px;
    line-height: 1.3;
    animation: fadeUp 0.7s ease 0.5s both;
  }

  .highlight-iphone {
    display: inline-block;
    color: var(--white);
    background: var(--charcoal);
    padding: 0px 3px;
    border: 1.5px solid var(--black);
    border-radius: 4px;
    line-height: 1.1;
    transform: rotate(-2deg);
    box-shadow: 3px 3px 0px 0px var(--black);
    animation: iphonePulse 1.8s ease-in-out infinite;
  }

  @keyframes iphonePulse {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(-2deg) scale(1.05); }
  }

  /* Neo-Brutalist Push Button */
  .cta-btn {
    display: block;
    width: 100%;
    margin: 0 auto;
    background: var(--green);
    color: var(--white);
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 18px 16px;
    border: 2px solid var(--black);
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 8px 8px 0px 0px var(--black);
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.7s ease 0.65s both, btnBounce 2.2s ease-in-out 1.4s infinite;
  }

  .cta-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -120%;
    width: 60%;
    height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.55), transparent);
    transform: skewX(-20deg);
    animation: btnShine 2.8s ease-in-out 1.6s infinite;
    pointer-events: none;
  }

  @keyframes btnShine {
    0% { left: -120%; }
    55%, 100% { left: 160%; }
  }

  @keyframes btnBounce {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-2px, -2px); }
  }

  .cta-btn:hover,
  .cta-btn:active {
    transform: translate(4px, 4px);
    box-shadow: 4px 4px 0px 0px var(--black);
    animation: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Decoração abaixo do botão */
  .cta-footer {
    display: inline-block;
    margin-top: 22px;
    font-family: 'Satoshi', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--black);
    letter-spacing: 1px;
    background: var(--sage);
    border: 2px solid var(--black);
    border-radius: 999px;
    padding: 6px 16px;
    box-shadow: 4px 4px 0px 0px var(--black);
    animation: fadeUp 0.7s ease 0.85s both;
  }

  /* Estrelas */
  .stars {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 16px;
    animation: fadeUp 0.7s ease 0.95s both;
  }

  .stars span {
    font-size: 18px;
    color: #ffbc2e;
  }

  /* Responsive mínimo */
  @media (max-width: 360px) {
    .cta-text-green { font-size: 52px; }
  }

  /* ═══════ DESKTOP ═══════ */
  @media (min-width: 768px) {
    body {
      align-items: center;
      padding: 40px 24px;
      background-image: radial-gradient(rgba(255,255,255,0.06) 2px, transparent 2px);
      background-size: 36px 36px;
    }

    .page-wrapper {
      max-width: 1040px;
      display: flex;
      align-items: stretch;
      border: 2px solid var(--black);
      border-radius: 20px;
      box-shadow: 12px 12px 0px 0px var(--black);
    }

    /* Banner ocupa a metade esquerda */
    .banner {
      flex: 1 1 52%;
      border-bottom: none;
      border-right: 2px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .banner-img-wrap {
      width: 100%;
    }

    .banner-img-wrap img {
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    /* CTA na metade direita, centralizada verticalmente */
    .cta-section {
      flex: 1 1 48%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
    }

    .cta-card {
      max-width: 460px;
      padding: 0;
    }

    .cta-text { font-size: 30px; }
    .cta-text-green { font-size: 58px; padding: 6px 24px; }
    .cta-text-green2 { font-size: 24px; margin-top: 18px; margin-bottom: 34px; }
    .highlight-iphone { padding: 1px 6px; }
    .cta-btn { font-size: 24px; padding: 22px 16px; }
    .stars span { font-size: 22px; }
    .cta-footer { font-size: 13px; margin-top: 26px; }
  }

  /* ─── SECTION 3: PROVAS SOCIAIS ─── */
  .provas-section {
    background: var(--yellow);
    background-image: radial-gradient(rgba(0,0,0,0.10) 2px, transparent 2px);
    background-size: 32px 32px;
    padding: 52px 0 60px;
    text-align: center;
    overflow: hidden;
  }

  .provas-title {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--charcoal);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 40px;
    padding: 0 20px;
  }

  .coverflow {
    position: relative;
    width: 100%;
    height: 300px;
    perspective: 1000px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cf-item {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    border: 3px solid #222;
  }

  .cf-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  .cf-item.active {
    transform: translateX(0) scale(1) rotateY(0deg);
    z-index: 10;
    border-color: #E01F1F;
    box-shadow: 0 0 0 4px #E01F1F44, 0 16px 48px rgba(224,31,31,0.4);
  }

  .cf-item.prev1 {
    transform: translateX(-200px) scale(0.78) rotateY(40deg);
    z-index: 7;
    filter: brightness(0.55);
  }

  .cf-item.prev2 {
    transform: translateX(-340px) scale(0.58) rotateY(55deg);
    z-index: 4;
    filter: brightness(0.35);
  }

  .cf-item.next1 {
    transform: translateX(200px) scale(0.78) rotateY(-40deg);
    z-index: 7;
    filter: brightness(0.55);
  }

  .cf-item.next2 {
    transform: translateX(340px) scale(0.58) rotateY(-55deg);
    z-index: 4;
    filter: brightness(0.35);
  }

  .cf-item.hidden {
    transform: translateX(0) scale(0.4) rotateY(70deg);
    z-index: 1;
    opacity: 0;
    pointer-events: none;
  }

  /* ─── URGENCY BAR ─── */
  .urgency-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    background: #E01F1F;
    border-bottom: 2px solid var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px 16px;
    font-family: 'Cabinet Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--black);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .urgency-clock {
    font-size: 20px;
    display: inline-block;
    animation: clockTick 1s steps(1) infinite;
  }

  @keyframes clockTick {
    0%   { transform: rotate(0deg); }
    25%  { transform: rotate(6deg); }
    50%  { transform: rotate(0deg); }
    75%  { transform: rotate(-6deg); }
    100% { transform: rotate(0deg); }
  }

  .urgency-timer {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
  }

  /* empurra o conteúdo para não ficar atrás da barra */
  body { padding-top: 46px; }

  .cf-reflection {
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
    border-radius: 0 0 14px 14px;
    transform: scaleY(-1);
    opacity: 0.3;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════ -->

  <!-- ═══════════════════════════════════ -->

  <!-- ═══════════════════════════════════ -->
  <!--      SEÇÃO 3: PROVAS SOCIAIS        -->
  <!-- ═══════════════════════════════════ -->
  <section class="provas-section">
    <h2 class="provas-title">ELES<br><span class="cta-text-green">ACREDITARAM</span><br>E GANHARAM!</h2>

    <div class="coverflow" id="coverflow">
      <div class="cf-item" data-index="0">

    </div>

</div>

<script>
  // Todos os botões/CTAs do site
  const buttons = document.querySelectorAll('.cta-btn, button, a.cta-btn, [data-cta]');

  // Pulse extra ao entrar na viewport
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.style.animationPlayState = 'running';
      }
    });
  }, { threshold: 0.5 });

  buttons.forEach((btn) => {
    observer.observe(btn);

    btn.addEventListener('click', function(e) {
      e.preventDefault();

      // Dispara evento de Lead no Meta Pixel
      if (typeof fbq === 'function') {
        fbq('track', 'Lead');
      }

      // Efeito ripple
      const ripple = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `
        position:absolute;
        width:${size}px;height:${size}px;
        border-radius:50%;
        background:rgba(255,255,255,0.3);
        top:${e.clientY - rect.top - size/2}px;
        left:${e.clientX - rect.left - size/2}px;
        transform:scale(0);
        animation:rippleAnim 0.5s ease-out forwards;
        pointer-events:none;
      `;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);

      // Redireciona após registrar o Lead (se houver destino real)
      const href = btn.getAttribute('href');
      if (href && href !== '#') {
        setTimeout(() => { window.location.href = href; }, 300);
      }
    });
  });

  // Coverflow 3D — autoplay
  (function() {
    const items = Array.from(document.querySelectorAll('.cf-item'));
    const total = items.length;
    let current = 0;
    let timer;

    function goTo(index) {
      current = (index + total) % total;
      items.forEach((item, i) => {
        const diff = i - current;
        item.className = 'cf-item';
        if (diff === 0)       item.classList.add('active');
        else if (diff === -1) item.classList.add('prev1');
        else if (diff === -2) item.classList.add('prev2');
        else if (diff === 1)  item.classList.add('next1');
        else if (diff === 2)  item.classList.add('next2');
        else                  item.classList.add('hidden');
      });
    }

    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(() => goTo(current + 1), 2500);
    }

    let touchStartX = 0;
    const cf = document.getElementById('coverflow');
    cf.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    cf.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) { goTo(current + (diff > 0 ? 1 : -1)); resetTimer(); }
    });

    goTo(0);
    resetTimer();
  })();

  // Timer de urgência — 9 min 59 s, para em 00:00
  (function() {
    let total = 9 * 60 + 59;
    const el = document.getElementById('urgency-timer');
    const tick = setInterval(() => {
      if (total <= 0) { clearInterval(tick); el.textContent = '00:00'; return; }
      total--;
      const m = String(Math.floor(total / 60)).padStart(2, '0');
      const s = String(total % 60).padStart(2, '0');
      el.textContent = m + ':' + s;
    }, 1000);
  })();

  const style = document.createElement('style');
  style.textContent = `
    @keyframes rippleAnim {
      to { transform: scale(2.5); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
</script>

</body>
