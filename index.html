<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
  }

  .page-wrapper {
    width: 100%;
    max-width: 430px;
    background: #fff;
    position: relative;
    overflow: hidden;
  }

  /* ─── SECTION 1: BANNER VERMELHO ─── */
  .banner {
    background: #D10000;
    position: relative;
    overflow: hidden;
    padding: 0;
  }

  .banner-img-wrap {
    position: relative;
    z-index: 4;
    line-height: 0;
    animation: motoIn 0.9s cubic-bezier(.22,1,.36,1) 0.2s both;
  }

  .banner-img-wrap img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
  }

  /* Brilho diagonal */
  .banner::before {
    content: '';
    position: absolute;
    top: -80px; left: -60px;
    width: 200%; height: 300px;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
    pointer-events: none;
    animation: sheen 4s ease-in-out infinite;
  }

  /* Textura grunge overlay */
  .banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.18;
    pointer-events: none;
  }

  @keyframes sheen {
    0%, 100% { transform: translateX(-30%); opacity: 0; }
    40% { opacity: 1; }
    60% { transform: translateX(20%); opacity: 0; }
  }

  /* Logo S */
  .logo-s {
    position: absolute;
    top: 14px; right: 16px;
    width: 38px; height: 38px;
    background: #a00000;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: #fff;
    border: 2px solid rgba(255,255,255,0.25);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    z-index: 10;
    animation: dropIn 0.6s cubic-bezier(.22,1,.36,1) both;
  }

  /* Badge CONCORRA A */
  .badge-concorra {
    display: inline-block;
    background: rgba(0,0,0,0.28);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.15);
    margin-bottom: 10px;
    animation: dropIn 0.5s cubic-bezier(.22,1,.36,1) 0.1s both;
  }

  /* Título principal */
  .banner-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 0.9;
    color: #fff;
    letter-spacing: 2px;
    text-shadow:
      3px 3px 0 rgba(0,0,0,0.3),
      6px 6px 0 rgba(0,0,0,0.15);
    position: relative;
    z-index: 2;
    animation: dropIn 0.6s cubic-bezier(.22,1,.36,1) 0.2s both;
  }

  .banner-title span {
    display: block;
  }

  .title-line2 {
    font-size: 88px !important;
    color: #fff;
    -webkit-text-stroke: 2px rgba(255,255,255,0.4);
  }

  /* Badge prêmios */
  .badge-prizes {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    background: #1a5c2a;
    border: 3px solid #c8a000;
    border-radius: 8px;
    padding: 8px 20px;
    margin-top: 12px;
    position: relative;
    z-index: 3;
    animation: dropIn 0.6s cubic-bezier(.22,1,.36,1) 0.35s both;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .badge-prizes .plus {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 900;
    color: #ffd700;
    letter-spacing: 2px;
  }

  .badge-prizes .value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1;
  }

  .badge-prizes .em-premios {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: #ffd700;
    letter-spacing: 2px;
  }

  /* Moto */
  .moto-wrap {
    position: relative;
    z-index: 4;
    text-align: center;
    margin-top: -10px;
    animation: motoIn 0.9s cubic-bezier(.22,1,.36,1) 0.5s both;
  }

  .moto-wrap img {
    width: 100%;
    max-width: 340px;
    filter: drop-shadow(-8px 12px 24px rgba(0,0,0,0.7));
  }

  @keyframes motoIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Badge preço */
  .badge-price {
    position: absolute;
    bottom: 28px; right: 16px;
    background: #8b0000;
    border: 2px solid #ff4444;
    border-radius: 10px;
    padding: 9px 14px;
    text-align: center;
    z-index: 10;
    animation: dropIn 0.6s cubic-bezier(.22,1,.36,1) 0.8s both;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .badge-price .apenas {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    display: block;
  }

  .badge-price .price-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: #fff;
    line-height: 1;
    display: block;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  /* Notas de dinheiro flutuantes */
  .money-note {
    position: absolute;
    font-size: 28px;
    z-index: 3;
    pointer-events: none;
    animation: floatNote var(--dur, 3s) ease-in-out var(--delay, 0s) infinite alternate;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    opacity: 0.85;
  }

  @keyframes floatNote {
    from { transform: translateY(0) rotate(var(--rot-from, -8deg)); }
    to   { transform: translateY(-12px) rotate(var(--rot-to, 8deg)); }
  }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── SECTION 2: CTA BRANCO ─── */
  .cta-section {
    background: #fff;
    padding: 36px 24px 48px;
    text-align: center;
    position: relative;
  }

  .cta-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #D10000, #ff4444, #D10000);
  }

  .cta-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #111;
    line-height: 1.2;
    margin-bottom: 4px;
    animation: fadeUp 0.7s ease 0.2s both;
    letter-spacing: -0.5px;
    text-transform: uppercase;
  }

  .cta-text-green {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 58px;
    color: #00A651;
    line-height: 1;
    letter-spacing: 2px;
    animation: fadeUp 0.7s ease 0.35s both;
    text-shadow: 2px 2px 0 rgba(0,166,81,0.2);
  }

  .cta-text-green2 {
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: #00A651;
    margin-bottom: 28px;
    animation: fadeUp 0.7s ease 0.5s both;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .highlight-iphone {
    display: inline-block;
    color: #fff;
    background: #111;
    padding: 1px 8px;
    border-radius: 6px;
    transform: rotate(-2deg);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    animation: iphonePulse 1.8s ease-in-out infinite;
  }

  @keyframes iphonePulse {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(-2deg) scale(1.06); }
  }

  .cta-btn {
    display: block;
    width: 90%;
    margin: 0 auto;
    background: linear-gradient(180deg, #00D65A 0%, #00C853 60%, #00A844 100%);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 18px 0;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow:
      0 8px 24px rgba(0,200,83,0.45),
      0 2px 0 rgba(255,255,255,0.15) inset;
    animation: fadeUp 0.7s ease 0.65s both, pulse 2.4s ease-in-out 1.5s infinite;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    text-decoration: none;
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -75%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-20deg);
    animation: btnSheen 3s ease-in-out 2s infinite;
  }

  @keyframes btnSheen {
    0% { left: -75%; }
    60%, 100% { left: 130%; }
  }

  .cta-btn:hover {
    transform: scale(1.02);
    box-shadow:
      0 12px 32px rgba(0,200,83,0.55),
      0 2px 0 rgba(255,255,255,0.15) inset;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 24px rgba(0,200,83,0.45), 0 2px 0 rgba(255,255,255,0.15) inset; }
    50% { box-shadow: 0 8px 36px rgba(0,200,83,0.7), 0 2px 0 rgba(255,255,255,0.15) inset; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Decoração abaixo do botão */
  .cta-footer {
    margin-top: 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    color: #999;
    letter-spacing: 1px;
    animation: fadeUp 0.7s ease 0.85s both;
  }

  /* Estrelinhas decorativas */
  .stars {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 12px;
    animation: fadeUp 0.7s ease 0.95s both;
  }

  .stars span {
    font-size: 14px;
    color: #ffd700;
  }

  /* Responsive mínimo */
  @media (max-width: 360px) {
    .banner-title { font-size: 60px; }
    .title-line2 { font-size: 72px !important; }
    .cta-text-green { font-size: 48px; }
  }
</style>

<body>

<div class="page-wrapper">

  <!-- ═══════════════════════════════════ -->
  <!--        SEÇÃO 1: BANNER VERMELHO     -->
  <!-- ═══════════════════════════════════ -->
  <section class="banner">

    <!-- Notas de dinheiro flutuantes ao redor -->
    <div class="money-note" style="top:6%;left:3%;--dur:2.8s;--delay:0s;--rot-from:-15deg;--rot-to:5deg;">💵</div>
    <div class="money-note" style="top:14%;right:4%;--dur:2.6s;--delay:0.7s;--rot-from:-8deg;--rot-to:12deg;">💵</div>
    <div class="money-note" style="top:50%;left:2%;--dur:3.5s;--delay:0.2s;--rot-from:12deg;--rot-to:-10deg;font-size:22px;">💰</div>
    <div class="money-note" style="top:58%;right:3%;--dur:3s;--delay:0.9s;--rot-from:-10deg;--rot-to:8deg;font-size:20px;">💵</div>
    <div class="money-note" style="top:80%;left:4%;--dur:4s;--delay:1.1s;--rot-from:5deg;--rot-to:-12deg;font-size:18px;">💴</div>
    <div class="money-note" style="top:86%;right:5%;--dur:3.3s;--delay:0.5s;--rot-from:-6deg;--rot-to:10deg;font-size:20px;">💵</div>

    <!-- Banner completo (imagem) -->
    <div class="banner-img-wrap">
      <img src="https://i.imgur.com/5wIgz57.png" alt="Concorra a 160 dos Sonhos - Honda CG" loading="eager">
    </div>

  </section>

  <!-- ═══════════════════════════════════ -->
  <!--        SEÇÃO 2: CTA BRANCO          -->
  <!-- ═══════════════════════════════════ -->
  <section class="cta-section">

    <p class="cta-text">Entre no grupo e</p>
    <p class="cta-text-green">CONCORRA</p>
    <p class="cta-text-green2">A 1 <span class="highlight-iphone">IPHONE 13</span> TOTALMENTE GRATUITO 👇</p>

    <a href="https://chat.whatsapp.com/HXRc0BVfvfOEemBRPw6jCL" class="cta-btn">🏆 ENTRAR NO GRUPO VIP</a>

    <div class="stars">
      <span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
    </div>

    <p class="cta-footer">PROMOÇÃO VÁLIDA POR TEMPO LIMITADO</p>

  </section>

</div>

<script>
  // Todos os botões/CTAs do site
  const buttons = document.querySelectorAll('.cta-btn, button, a.cta-btn, [data-cta]');

  // Pulse extra ao entrar na viewport
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.style.animationPlayState = 'running';
      }
    });
  }, { threshold: 0.5 });

  buttons.forEach((btn) => {
    observer.observe(btn);

    btn.addEventListener('click', function(e) {
      e.preventDefault();

      // Dispara evento de Lead no Meta Pixel
      if (typeof fbq === 'function') {
        fbq('track', 'Lead');
      }

      // Efeito ripple
      const ripple = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `
        position:absolute;
        width:${size}px;height:${size}px;
        border-radius:50%;
        background:rgba(255,255,255,0.3);
        top:${e.clientY - rect.top - size/2}px;
        left:${e.clientX - rect.left - size/2}px;
        transform:scale(0);
        animation:rippleAnim 0.5s ease-out forwards;
        pointer-events:none;
      `;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);

      // Redireciona após registrar o Lead (se houver destino real)
      const href = btn.getAttribute('href');
      if (href && href !== '#') {
        setTimeout(() => { window.location.href = href; }, 300);
      }
    });
  });

  const style = document.createElement('style');
  style.textContent = `
    @keyframes rippleAnim {
      to { transform: scale(2.5); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
</script>

</body>
</html>
